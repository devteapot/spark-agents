# Hermes Agent Configuration
# Location: ~/.hermes/cli-config.yaml (on MBA: sloppy@sloppy-mba.local)
#
# This configures Hermes to use the DGX Spark as its inference backend
# with SuperGemma4 as the primary model and Qwen3-Coder-Next for coding tasks.

# --- Provider: DGX Spark Ollama ---
provider: custom
model: supergemma4:26b-q8
base_url: "http://slopinator-s-1.local:11434/v1"
api_key: "ollama-local"

# --- Model Aliases ---
# Shortcuts for switching models via /model command
model_aliases:
  general:
    model: "supergemma4:26b-q8"
    provider: custom
    base_url: "http://slopinator-s-1.local:11434/v1"
    context_length: 8192
    max_tokens: 4096

  coder:
    model: "qwen3-coder-next:q6k"
    provider: custom
    base_url: "http://slopinator-s-1.local:11434/v1"
    context_length: 32768
    max_tokens: 8192

# --- Smart Model Routing ---
# Route simple/short turns to the faster general model,
# keep the coding model for code-heavy tasks
smart_model_routing:
  enabled: true
  max_simple_chars: 200
  max_simple_words: 35
  cheap_model:
    provider: custom
    model: "supergemma4:26b-q8"
    base_url: "http://slopinator-s-1.local:11434/v1"
    api_key: "ollama-local"

# --- Agent Behavior ---
# Run as a background autonomous agent
autonomous: true

# Skill creation — let Hermes learn from complex tasks
skills:
  auto_create: true
  min_tool_calls: 5

# Memory — persist across sessions
memory:
  enabled: true
  provider: local

# --- Tool Configuration ---
tools:
  enabled: true
  # Add your tool configurations here, e.g.:
  # web_search:
  #   enabled: true
  # file_system:
  #   enabled: true
  #   allowed_paths:
  #     - /home/sloppy/projects
  # shell:
  #   enabled: true
  #   allowed_commands: ["git", "npm", "python3", "cargo"]

