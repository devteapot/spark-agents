# Hermes Agent Configuration
# Location after deploy: ~/.hermes/cli-config.yaml (on MBA: sloppy@sloppy-mba.local)
#
# Hermes talks only to the local LiteLLM router. The router owns mode switching:
#   - agent-mode     -> Spark vLLM for `general` / `coder`
#   - benchmark-mode -> hosted OpenRouter models
# Hidden cloud aliases stay available so Hermes can fail over without changing
# its stable public model names.

provider: custom
model: coder
base_url: "http://127.0.0.1:4000/v1"
api_key: "litellm-local"

model_aliases:
  general:
    model: "general"
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    context_length: 8192
    max_tokens: 4096

  coder:
    model: "coder"
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    context_length: 32768
    max_tokens: 8192

  general-cloud:
    model: "general-cloud"
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    context_length: 8192
    max_tokens: 4096

  coder-cloud:
    model: "coder-cloud"
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    context_length: 32768
    max_tokens: 8192

smart_model_routing:
  enabled: true
  max_simple_chars: 200
  max_simple_words: 35
  cheap_model:
    provider: custom
    model: "general"
    base_url: "http://127.0.0.1:4000/v1"
    api_key: "litellm-local"

fallback_model:
  provider: custom
  model: "general-cloud"
  base_url: "http://127.0.0.1:4000/v1"
  api_key: "litellm-local"

autonomous: true

skills:
  auto_create: true
  min_tool_calls: 5

memory:
  enabled: true
  provider: local

tools:
  enabled: true

