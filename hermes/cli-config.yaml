# Hermes Agent Configuration
# Location after deploy: ~/.hermes/config.yaml (on MBA: sloppy@sloppy-mba.local)
#
# Hermes talks only to the local LiteLLM router. The router owns mode switching:
#   - agent-mode   -> Spark vLLM for `general`
#   - offload-mode -> hosted OpenRouter models (Spark GPU free for other compute)

model:
  default: general
  provider: custom
  base_url: "http://127.0.0.1:4000/v1"
  api_key: "litellm-local"
  context_length: 262144

delegation:
  model: general-think
  provider: custom
  base_url: "http://127.0.0.1:4000/v1"
  api_key: "litellm-local"
  max_iterations: 80
  default_toolsets: ["terminal", "file"]

auxiliary:
  vision:
    model: general
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    api_key: "litellm-local"
    timeout: 120
  web_extract:
    model: general
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    api_key: "litellm-local"
    timeout: 600
  compression:
    model: general-think
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    api_key: "litellm-local"
    context_length: 262144
    timeout: 600
  session_search:
    model: general-think
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    api_key: "litellm-local"
  flush_memories:
    model: general
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    api_key: "litellm-local"
  approval:
    model: general
    provider: custom
    base_url: "http://127.0.0.1:4000/v1"
    api_key: "litellm-local"

compression:
  enabled: true
  threshold: 0.75
  target_ratio: 0.20
  protect_last_n: 20
  summary_model: general-think
  summary_provider: custom
  summary_base_url: "http://127.0.0.1:4000/v1"

smart_model_routing:
  enabled: false

agent:
  max_turns: 200
  reasoning_effort: "high"
  tool_use_enforcement: false

autonomous: true

skills:
  auto_create: true
  auto_improve: true

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375

tools:
  enabled: true

terminal:
  backend: local
  timeout: 300

file_read_max_chars: 100000

checkpoints:
  enabled: true
  max_snapshots: 50

approvals:
  mode: "off"

display:
  tool_progress: all
  bell_on_complete: true
  streaming: false
  show_cost: false

timezone: "Europe/Zurich"
