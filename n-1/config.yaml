n-1:
  ip: 192.168.1.48
  hostname: slopinator-n-1
  user: carlid
  role: inference-node
  specs:
    cpu: AMD Ryzen 5 7600X (12-core)
    ram: 32GB DDR5
    gpu: NVIDIA RTX 3090 (24GB)
    os: Fedora 44
    cuda: 13.2
    podman: 5.8.2
  note: Uses root podman (not rootless) for NVIDIA GPU passthrough

vllm:
  port: 8020
  model: Lorbus/Qwen3.6-27B-int4-AutoRound
  quant: AutoRound INT4 (BF16 mtp.fc preserved)
  backend: vLLM nightly dev205 (07351e08) + Sandermage Genesis v7.14 patches
  config:
    max_model_len: 48000
    gpu_memory_utilization: 0.92
    kv_cache_dtype: turboquant_3bit_nc
    speculative_decoding: MTP n=3
    enable_prefix_caching: true
    enable_chunked_prefill: true
    vision: enabled (MoonViT BF16)
  performance:
    throughput: ~51 narrative / ~67 code tok/s
    vram_used: ~21GB / 24GB
  notes: |
    Sits below both prefill cliffs (GDN forward ~50-60K, TQ tool-prefill at high mem_util).
    Oversized requests get HTTP 400, not OOM crashes. See vllm/docker-compose.yaml header
    for the variant matrix (64K/128K/192K/205K) and trade-offs.
