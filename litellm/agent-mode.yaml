litellm_settings:
  ssl_verify: false
  drop_params: true

model_list:
  - model_name: general
    litellm_params:
      model: openai/Qwen/Qwen3.6-27B
      api_base: http://192.168.1.96:8001/v1
      api_key: llama-llm
      timeout: 300

  - model_name: general-think
    litellm_params:
      model: openai/Qwen/Qwen3.6-27B
      api_base: http://192.168.1.96:8001/v1
      api_key: llama-llm
      timeout: 900

  - model_name: general-cloud
    litellm_params:
      model: openrouter/google/gemini-2.5-flash
      api_key: os.environ/OPENROUTER_API_KEY
