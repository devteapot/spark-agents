services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: spark-litellm
    network_mode: host
    restart: unless-stopped
    volumes:
      - ${LITELLM_CONFIG_PATH:-.}/config.yaml:/app/config.yaml:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-missing-openrouter-key}
    command:
      - --config
      - /app/config.yaml
      - --host
      - "127.0.0.1"
      - --port
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:4000/v1/models\", timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
