services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: spark-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ${LITELLM_CONFIG_PATH:-.}/config.yaml:/app/config.yaml:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-missing-openrouter-key}
    command:
      - --config
      - /app/config.yaml
      - --host
      - "0.0.0.0"
      - --port
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
