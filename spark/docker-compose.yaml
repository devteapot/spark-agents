services:
  llama-cpp-27b:
    image: spark-agents/llama-cpp-cuda:local
    container_name: spark-llama-cpp-27b
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /models/27b-q4:/models/27b-q4:ro
    command:
      - "-m"
      - "/models/27b-q4/Qwen3.6-27B-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--ctx-size"
      - "524288"
      - "--cache-type-k"
      - "q8_0"
      - "--cache-type-v"
      - "q8_0"
      - "--n-gpu-layers"
      - "99"
      - "--no-mmap"
      - "--jinja"
      - "--parallel"
      - "4"
      - "--temp"
      - "0.6"
      - "--top-p"
      - "0.95"
      - "--top-k"
      - "20"
      - "--reasoning-budget"
      - "0"
      - "--log-disable"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
