services:
  vllm-supergemma:
    image: spark-agents/vllm-supergemma:local
    container_name: spark-vllm-supergemma
    restart: unless-stopped
    network_mode: host
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface/hub
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
    volumes:
      - /srv/models/supergemma4-nvfp4:/models/supergemma:ro
      - /srv/spark-agents/cache/supergemma:/root/.cache
    command:
      - vllm
      - serve
      - /models/supergemma
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
      - --served-model-name
      - AEON-7/supergemma4-26b-abliterated-multimodal-nvfp4
      - --quantization
      - modelopt
      - --dtype
      - auto
      - --kv-cache-dtype
      - fp8
      - --moe-backend
      - marlin
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "262144"
      - --max-num-seqs
      - "4"
      - --gpu-memory-utilization
      - "0.92"
      - --trust-remote-code
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8001/v1/models\", timeout=3)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
