services:
  vllm-qwen:
    image: spark-agents/vllm-qwen:local
    container_name: spark-vllm-qwen
    restart: unless-stopped
    network_mode: host
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface/hub
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
    volumes:
      - /srv/models/qwen3.6-35b-a3b-fp8:/models/qwen:ro
      - /srv/spark-agents/cache/qwen:/root/.cache
    command:
      - vllm
      - serve
      - /models/qwen
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
      - --served-model-name
      - Qwen/Qwen3.6-35B-A3B-FP8
      - --dtype
      - auto
      - --kv-cache-dtype
      - fp8
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "262144"
      - --max-num-seqs
      - "8"
      - --max-num-batched-tokens
      - "4192"
      - --gpu-memory-utilization
      - "0.92"
      - --trust-remote-code
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --reasoning-parser
      - deepseek_r1
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8001/v1/models\", timeout=3)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
