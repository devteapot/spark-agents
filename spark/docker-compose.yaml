services:
  vllm-qwen:
    image: spark-agents/vllm-qwen:local
    container_name: spark-vllm-qwen
    restart: unless-stopped
    network_mode: host
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface/hub
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
    volumes:
      - /srv/models/qwen3.6-35b-a3b-fp8:/models/qwen:ro
      - /srv/spark-agents/cache/qwen:/root/.cache
    command:
      - vllm
      - serve
      - /models/qwen
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
      - --served-model-name
      - Qwen/Qwen3.6-35B-A3B-FP8
      - --dtype
      - auto
      - --kv-cache-dtype
      - fp8
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "262144"
      - --max-num-seqs
      - "32"
      - --max-num-batched-tokens
      - "16384"
      - --gpu-memory-utilization
      - "0.80"
      - --trust-remote-code
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --reasoning-parser
      - qwen3
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8001/v1/models\", timeout=3)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  llama-cpp-27b:
    image: spark-agents/llama-cpp-cuda:local
    container_name: spark-llama-cpp-27b
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /models/27b-q4:/models/27b-q4:ro
    command:
      - "-m"
      - "/models/27b-q4/Qwen3.6-27B-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--ctx-size"
      - "131072"
      - "--n-gpu-layers"
      - "99"
      - "--no-mmap"
      - "--jinja"
      - "--temp"
      - "0.6"
      - "--top-p"
      - "0.95"
      - "--top-k"
      - "20"
      - "--chat-template-kwargs"
      - '{"enable_thinking": false}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
